<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JavaScript Form Validator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<div class="card">
  <div class="visual">
    <img src="https://i.pinimg.com/1200x/e6/85/ae/e685aeee9ee7085c5aac7c5936e6ac26.jpg" alt="">
  </div>

  <div class="form-panel">
    <h1>JavaScript Form Validator</h1>

    <form id="validatorForm" novalidate>
      <div class="field" data-field="name">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your name">
        <div class="error-message">Please enter your name.</div>
      </div>

      <div class="field" data-field="email">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email">
        <div class="error-message">Please enter a valid email address.</div>
      </div>

      <div class="field" data-field="phone">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone" placeholder="Enter your phone">
        <div class="error-message">Please enter a valid phone number.</div>
      </div>

      <div class="field" data-field="password">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password">
        <div class="error-message">Password must be at least 8 characters.</div>
      </div>

      <div class="field" data-field="message">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Enter your message"></textarea>
        <div class="error-message">Please enter a message.</div>
      </div>

      <button type="submit" class="submit-btn">Submit</button>
    </form>
  </div>
</div>

<script>
  const form = document.getElementById('validatorForm');
  const submitBtn = form.querySelector('.submit-btn');

  const validators = {
    name: value => value.trim().length > 0,
    email: value => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value),
    phone: value => /^[0-9+\-\s()]{7,}$/.test(value),
    password: value => value.length >= 8,
    message: value => value.trim().length > 0
  };

  function setFieldError(name, hasError) {
    const fieldWrapper = form.querySelector(`[data-field="${name}"]`);
    if (fieldWrapper) fieldWrapper.classList.toggle('error', hasError);
  }

  function runClientValidation() {
    let isValid = true;
    Object.keys(validators).forEach(name => {
      const input = form.elements[name];
      const valid = validators[name](input.value);
      setFieldError(name, !valid);
      if (!valid) isValid = false;
    });
    return isValid;
  }

  form.addEventListener('submit', async function (e) {
    e.preventDefault();

    // Client-side check first: fast feedback, no network round trip
    // for obviously empty/malformed fields.
    if (!runClientValidation()) return;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending...';

    try {
      const response = await fetch('/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: form.elements.name.value,
          email: form.elements.email.value,
          phone: form.elements.phone.value,
          message: form.elements.message.value
          // Note: password is intentionally NOT sent — see main.go comment.
        })
      });

      const data = await response.json();

      if (response.ok) {
        alert('Form submitted successfully!');
        form.reset();
      } else if (data.errors) {
        // Server-side validation caught something the client missed
        // (e.g. JS disabled, or a stale client build).
        data.errors.forEach(err => setFieldError(err.field, true));
      } else {
        alert('Something went wrong submitting the form. Please try again.');
      }
    } catch (err) {
      alert('Could not reach the server. Check your connection and try again.');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Submit';
    }
  });
</script>

</body>
</html>
